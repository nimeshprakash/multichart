<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XAU/USD</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0b0f14;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
    }

    .bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      background: #0b0f14;
      border-bottom: 1px solid #1a2232;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 200;
    }
    .bar.light { background: #f0f0f0; border-color: #ddd; }
    .clock { font-size: 12px; color: #f0b429; letter-spacing: 1.5px; }
    .bar.light .clock { color: #b07d00; }
    .controls { display: flex; gap: 3px; align-items: center; }

    .btn {
      background: transparent;
      border: 1px solid #243040;
      color: #556070;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 2px 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: all .12s;
      letter-spacing: .5px;
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }
    .bar.light .btn { border-color: #ccc; color: #888; }
    .btn:hover  { border-color: #f0b429; color: #f0b429; }
    .btn.active { border-color: #f0b429; color: #f0b429; background: rgba(240,180,41,.1); }

    .sep { width: 1px; height: 16px; background: #1a2232; margin: 0 4px; }
    .bar.light .sep { background: #ddd; }

    .fs-icon { width: 11px; height: 11px; position: relative; flex-shrink: 0; }
    .fs-icon::before, .fs-icon::after {
      content: ''; position: absolute; border-color: currentColor;
      border-style: solid; width: 4px; height: 4px;
    }
    .fs-icon::before { top:0; left:0; border-width: 1.5px 0 0 1.5px; }
    .fs-icon::after  { bottom:0; right:0; border-width: 0 1.5px 1.5px 0; }

    .grid {
      position: fixed;
      top: 32px; left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 1px;
      background: #1a2232;
    }
    body.fullscreen .bar  { display: none; }
    body.fullscreen .grid { top: 0; }

    .cell { position: relative; background: #131722; overflow: hidden; }
    .grid.light .cell { background: #ffffff; }
    .cell iframe {
      position: absolute; top: 0; left: -50px;
      width: calc(100% + 50px); height: 100%;
      border: none; display: block;
    }
  </style>
</head>
<body>

<div class="bar" id="bar">
  <span class="clock" id="clk">--:--:-- AST</span>
  <div class="controls">
    <button class="btn" id="dark-btn"    data-theme="dark">Dark</button>
    <button class="btn" id="light-btn"   data-theme="light">Light</button>
    <div class="sep"></div>
    <button class="btn" id="toolbar-btn">Toolbar</button>
    <button class="btn" id="legend-btn">Legend</button>
    <div class="sep"></div>
    <button class="btn" id="fs-btn"><span class="fs-icon"></span>Full</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
  const CHARTS = [
    { sym:'OANDA:XAUUSD',    iv:'60'  },
    { sym:'TVC:GOLD',        iv:'240' },
    { sym:'FOREXCOM:XAUUSD', iv:'15'  },
    { sym:'OANDA:XAUUSD',    iv:'D'   },
    { sym:'TVC:GOLD',        iv:'5'   },
    { sym:'FOREXCOM:XAUUSD', iv:'W'   },
  ];

  /* ── PERSIST SETTINGS ── */
  function loadSettings() {
    try {
      const raw = localStorage.getItem('xau_dash');
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    try {
      const raw = sessionStorage.getItem('xau_dash');
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { theme: 'dark', showToolbar: true, showLegend: false };
  }

  function saveSettings() {
    const data = JSON.stringify({ theme, showToolbar, showLegend });
    try { localStorage.setItem('xau_dash', data); } catch(e) {}
    try { sessionStorage.setItem('xau_dash', data); } catch(e) {}
  }

  /* ── LOAD SAVED STATE ── */
  const saved = loadSettings();
  let theme       = saved.theme       ?? 'dark';
  let showToolbar = saved.showToolbar ?? true;
  let showLegend  = saved.showLegend  ?? false;

  /* ── CLOCK (Bahrain UTC+3) ── */
  function tick() {
    const bhr = new Date(Date.now() + 3 * 3600000);
    const p   = n => String(n).padStart(2,'0');
    document.getElementById('clk').textContent =
      `${p(bhr.getUTCHours())}:${p(bhr.getUTCMinutes())}:${p(bhr.getUTCSeconds())} AST`;
  }
  tick(); setInterval(tick, 1000);

  /* ── URL ── */
  function makeUrl(sym, iv, th) {
    const dark = th === 'dark';
    const p = new URLSearchParams({
      symbol:              sym,
      interval:            iv,
      theme:               th,
      style:               '1',
      locale:              'en',
      toolbar_bg:          dark ? '#131722' : '#ffffff',
      enable_publishing:   'false',
      allow_symbol_change: 'false',
      save_image:          'false',
      hide_top_toolbar:    showToolbar ? 'false' : 'true',
      hide_side_toolbar:   'true',
      hide_legend:         showLegend  ? 'false' : 'true',
      withdateranges:      'false',
      backgroundColor:     dark ? 'rgba(19,23,34,1)' : 'rgba(255,255,255,1)',
      gridColor:           dark ? 'rgba(30,40,55,0.9)' : 'rgba(210,220,230,0.9)',
    });
    return `https://www.tradingview.com/widgetembed/?${p}`;
  }

  /* ── APPLY UI STATE (button highlights + bar class) ── */
  function applyUi() {
    const bar = document.getElementById('bar');
    bar.className = 'bar' + (theme === 'light' ? ' light' : '');

    document.getElementById('dark-btn').classList.toggle('active',    theme === 'dark');
    document.getElementById('light-btn').classList.toggle('active',   theme === 'light');
    document.getElementById('toolbar-btn').classList.toggle('active', showToolbar);
    document.getElementById('legend-btn').classList.toggle('active',  showLegend);
  }

  /* ── RENDER CHARTS ── */
  function render() {
    applyUi();
    saveSettings();
    const grid = document.getElementById('grid');
    grid.className = 'grid' + (theme === 'light' ? ' light' : '');
    grid.innerHTML = CHARTS.map(c => `
      <div class="cell">
        <iframe src="${makeUrl(c.sym, c.iv, theme)}"
          allowtransparency="false" scrolling="no" frameborder="0"></iframe>
      </div>`).join('');
  }

  /* ── THEME ── */
  document.getElementById('dark-btn').addEventListener('click', () => {
    theme = 'dark'; render();
  });
  document.getElementById('light-btn').addEventListener('click', () => {
    theme = 'light'; render();
  });

  /* ── TOOLBAR ── */
  document.getElementById('toolbar-btn').addEventListener('click', () => {
    showToolbar = !showToolbar; render();
  });

  /* ── LEGEND ── */
  document.getElementById('legend-btn').addEventListener('click', () => {
    showLegend = !showLegend; render();
  });

  /* ── FULLSCREEN ── */
  document.getElementById('fs-btn').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    document.body.classList.toggle('fullscreen', on);
    document.getElementById('fs-btn').innerHTML =
      `<span class="fs-icon"></span>${on ? 'Exit' : 'Full'}`;
  });

  /* ── INIT ── */
  render();
</script>
</body>
</html>
