<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XAU/USD</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:#0b0f14; overflow:hidden; font-family:'Share Tech Mono',monospace; }

    .bar {
      position:fixed; top:0; left:0; right:0; height:32px;
      background:#0b0f14; border-bottom:1px solid #1a2232;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 14px; z-index:200;
    }
    .bar.light { background:#f0f0f0; border-color:#ddd; }
    .clock { font-size:12px; color:#f0b429; letter-spacing:1.5px; }
    .bar.light .clock { color:#b07d00; }
    .controls { display:flex; gap:3px; align-items:center; }

    .btn {
      background:transparent; border:1px solid #243040; color:#556070;
      font-family:'Share Tech Mono',monospace; font-size:10px; padding:2px 10px;
      border-radius:2px; cursor:pointer; transition:all .12s; letter-spacing:.5px;
      display:flex; align-items:center; gap:5px; white-space:nowrap;
    }
    .bar.light .btn { border-color:#ccc; color:#888; }
    .btn:hover  { border-color:#f0b429; color:#f0b429; }
    .btn.active { border-color:#f0b429; color:#f0b429; background:rgba(240,180,41,.1); }
    .sep { width:1px; height:16px; background:#1a2232; margin:0 4px; }
    .bar.light .sep { background:#ddd; }

    .save-dot {
      width:6px; height:6px; border-radius:50%;
      background:#2a3a4a; transition:background .3s; flex-shrink:0;
    }
    .save-dot.saving { background:#f0b429; box-shadow:0 0 5px #f0b429; }
    .save-dot.saved  { background:#26a69a; box-shadow:0 0 5px #26a69a; }

    .fs-icon { width:11px; height:11px; position:relative; flex-shrink:0; }
    .fs-icon::before, .fs-icon::after {
      content:''; position:absolute; border-color:currentColor;
      border-style:solid; width:4px; height:4px;
    }
    .fs-icon::before { top:0; left:0; border-width:1.5px 0 0 1.5px; }
    .fs-icon::after  { bottom:0; right:0; border-width:0 1.5px 1.5px 0; }

    .grid {
      position:fixed; top:32px; left:0; right:0; bottom:0;
      display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr);
      gap:1px; background:#1a2232;
    }
    body.fullscreen .bar  { display:none; }
    body.fullscreen .grid { top:0; }

    .cell { position:relative; background:#131722; overflow:hidden; }
    .grid.light .cell { background:#ffffff; }

    /* TradingView widget container fills the cell */
    .tv-wrap {
      position:absolute; inset:0;
    }
    .tv-wrap > div {
      width:100% !important;
      height:100% !important;
    }

    /* INDICATOR PANEL */
    .ind-panel {
      position:fixed; top:42px; right:10px; width:210px;
      background:#0f1419; border:1px solid #1a2232; border-radius:4px;
      z-index:300; box-shadow:0 8px 40px rgba(0,0,0,.7);
      display:none; flex-direction:column; overflow:hidden;
    }
    .ind-panel.open  { display:flex; }
    .ind-panel.light { background:#fafafa; border-color:#ddd; }

    .panel-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 12px; border-bottom:1px solid #1a2232; flex-shrink:0;
    }
    .ind-panel.light .panel-head { border-color:#eee; }
    .panel-title { font-size:10px; color:#556070; letter-spacing:1.5px; }
    .panel-close { cursor:pointer; color:#556070; font-size:15px; line-height:1; transition:color .1s; }
    .panel-close:hover { color:#f0b429; }

    .panel-body { overflow-y:auto; max-height:calc(100vh - 120px); }
    .panel-body::-webkit-scrollbar { width:3px; }
    .panel-body::-webkit-scrollbar-thumb { background:#1a2232; border-radius:2px; }

    .ind-group { border-bottom:1px solid #1a2232; }
    .ind-panel.light .ind-group { border-color:#eee; }
    .ind-group:last-child { border-bottom:none; }

    .group-label {
      font-size:9px; color:#2a3a4a; letter-spacing:1.5px;
      padding:6px 12px 3px; text-transform:uppercase;
    }
    .ind-panel.light .group-label { color:#bbb; }

    .ind-row {
      display:flex; align-items:center; padding:6px 12px; gap:9px;
      cursor:pointer; transition:background .1s;
    }
    .ind-row:hover { background:rgba(240,180,41,.04); }

    .pill {
      width:28px; height:14px; border-radius:7px;
      background:#1a2232; position:relative; flex-shrink:0;
      border:1px solid #243040; transition:background .15s, border-color .15s;
    }
    .ind-panel.light .pill { background:#ddd; border-color:#ccc; }
    .ind-row.on .pill { background:rgba(240,180,41,.25); border-color:#f0b429; }
    .pill::after {
      content:''; position:absolute; top:1px; left:1px;
      width:10px; height:10px; border-radius:50%; background:#3a4a5a;
      transition:transform .15s, background .15s;
    }
    .ind-panel.light .pill::after { background:#bbb; }
    .ind-row.on .pill::after { transform:translateX(14px); background:#f0b429; }

    .ind-label { font-size:11px; color:#7a8a9a; flex:1; transition:color .12s; }
    .ind-panel.light .ind-label { color:#666; }
    .ind-row.on .ind-label { color:#e0c060; }

    .panel-foot { padding:8px 12px; border-top:1px solid #1a2232; flex-shrink:0; }
    .ind-panel.light .panel-foot { border-color:#eee; }
    .apply-btn {
      width:100%; padding:6px; background:rgba(240,180,41,.1);
      border:1px solid #f0b429; color:#f0b429;
      font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px;
      border-radius:2px; cursor:pointer; transition:background .12s;
    }
    .apply-btn:hover { background:rgba(240,180,41,.22); }
  </style>
</head>
<body>

<div class="bar" id="bar">
  <span class="clock" id="clk">--:--:-- AST</span>
  <div class="controls">
    <button class="btn" id="dark-btn">Dark</button>
    <button class="btn" id="light-btn">Light</button>
    <div class="sep"></div>
    <button class="btn" id="toolbar-btn">Toolbar</button>
    <button class="btn" id="legend-btn">Legend</button>
    <div class="sep"></div>
    <button class="btn" id="ind-btn">⊞ Indicators</button>
    <div class="sep"></div>
    <div class="save-dot" id="save-dot" title="Sync status"></div>
    <div class="sep"></div>
    <button class="btn" id="fs-btn"><span class="fs-icon"></span>Full</button>
  </div>
</div>

<div class="ind-panel" id="ind-panel">
  <div class="panel-head">
    <span class="panel-title">INDICATORS</span>
    <span class="panel-close" id="ind-close">✕</span>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-foot">
    <button class="apply-btn" id="apply-btn">▶ APPLY TO ALL CHARTS</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
  /* ══ CONFIG ══ */
  var CHARTS = [
    { sym:'OANDA:XAUUSD',    iv:'60'  },
    { sym:'TVC:GOLD',        iv:'240' },
    { sym:'FOREXCOM:XAUUSD', iv:'15'  },
    { sym:'OANDA:XAUUSD',    iv:'D'   },
    { sym:'TVC:GOLD',        iv:'5'   },
    { sym:'FOREXCOM:XAUUSD', iv:'W'   },
  ];

  var INDICATORS = [
    { id:'sma',      label:'SMA (20)',        group:'Trend',      study:'MASimple@tv-basicstudies' },
    { id:'ema',      label:'EMA (20)',        group:'Trend',      study:'MAExp@tv-basicstudies' },
    { id:'wma',      label:'WMA (20)',        group:'Trend',      study:'MAWeighted@tv-basicstudies' },
    { id:'bb',       label:'Bollinger Bands', group:'Trend',      study:'BB@tv-basicstudies' },
    { id:'psar',     label:'Parabolic SAR',   group:'Trend',      study:'PSAR@tv-basicstudies' },
    { id:'ichimoku', label:'Ichimoku Cloud',  group:'Trend',      study:'IchimokuCloud@tv-basicstudies' },
    { id:'rsi',      label:'RSI (14)',        group:'Momentum',   study:'RSI@tv-basicstudies' },
    { id:'macd',     label:'MACD',           group:'Momentum',   study:'MACD@tv-basicstudies' },
    { id:'stoch',    label:'Stochastic',      group:'Momentum',   study:'Stochastic@tv-basicstudies' },
    { id:'cci',      label:'CCI (20)',        group:'Momentum',   study:'CCI@tv-basicstudies' },
    { id:'williamr', label:'Williams %R',     group:'Momentum',   study:'WilliamR@tv-basicstudies' },
    { id:'volume',   label:'Volume',          group:'Volume',     study:'Volume@tv-basicstudies' },
    { id:'vwap',     label:'VWAP',           group:'Volume',     study:'VWAP@tv-basicstudies' },
    { id:'obv',      label:'OBV',            group:'Volume',     study:'OBV@tv-basicstudies' },
    { id:'atr',      label:'ATR (14)',        group:'Volatility', study:'ATR@tv-basicstudies' },
    { id:'stddev',   label:'Std Deviation',   group:'Volatility', study:'StdDev@tv-basicstudies' },
  ];

  /* ══ JSONBIN ══ */
  var BIN_URL = 'https://api.jsonbin.io/v3/b/69bb82e8b7ec241ddc805616';
  var HDRS    = { 'Content-Type':'application/json', 'X-Master-Key':'$2a$10$HWO87P5U7tC328dcahcMg.va6krOTvvz9rylup0rM9ChckkhWQQgm' };

  /* ══ STATE ══ */
  var theme       = 'dark';
  var showToolbar = true;
  var showLegend  = false;
  var active      = new Set();
  var saveTimer   = null;

  /* Load from localStorage immediately (sync) */
  try {
    var _raw = localStorage.getItem('xau_dash');
    if (_raw) {
      var _d = JSON.parse(_raw);
      theme       = _d.theme       != null ? _d.theme       : 'dark';
      showToolbar = _d.showToolbar != null ? _d.showToolbar : true;
      showLegend  = _d.showLegend  != null ? _d.showLegend  : false;
      active      = new Set(Array.isArray(_d.active) ? _d.active : []);
    }
  } catch(e) {}

  /* ══ CLOCK ══ */
  function tick() {
    var b = new Date(Date.now() + 3 * 3600000);
    var p = function(n) { return String(n).padStart(2,'0'); };
    document.getElementById('clk').textContent =
      p(b.getUTCHours()) + ':' + p(b.getUTCMinutes()) + ':' + p(b.getUTCSeconds()) + ' AST';
    setTimeout(tick, 1000);
  }

  /* ══ SAVE DOT ══ */
  function dotState(s) {
    document.getElementById('save-dot').className = 'save-dot' + (s ? ' ' + s : '');
  }

  /* ══ SAVE ══ */
  function saveSettings() {
    var data = { theme:theme, showToolbar:showToolbar, showLegend:showLegend, active:[...active] };
    try { localStorage.setItem('xau_dash', JSON.stringify(data)); } catch(e) {}
    dotState('saving');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function() {
      var snap = { theme:theme, showToolbar:showToolbar, showLegend:showLegend, active:[...active] };
      fetch(BIN_URL, { method:'PUT', headers:HDRS, body:JSON.stringify(snap) })
        .then(function() { dotState('saved'); setTimeout(function(){ dotState(''); }, 2000); })
        .catch(function() { dotState(''); });
    }, 800);
  }

  /* ══ SYNC FROM CLOUD (non-blocking background fetch) ══ */
  function syncFromCloud() {
    fetch(BIN_URL + '/latest', { headers:HDRS })
      .then(function(r) { return r.json(); })
      .then(function(json) {
        var d = json.record;
        if (!d) return;
        theme       = d.theme       != null ? d.theme       : theme;
        showToolbar = d.showToolbar != null ? d.showToolbar : showToolbar;
        showLegend  = d.showLegend  != null ? d.showLegend  : showLegend;
        active      = new Set(Array.isArray(d.active) ? d.active : [...active]);
        try { localStorage.setItem('xau_dash', JSON.stringify(d)); } catch(e) {}
        syncUi();
        buildPanel();
        renderCharts();
      })
      .catch(function() {});
  }

  /* ══ RENDER CHARTS using TradingView Widget JS API ══ */
  function renderCharts() {
    var grid = document.getElementById('grid');
    grid.className = 'grid' + (theme === 'light' ? ' light' : '');

    /* Collect active study strings */
    var studyList = [];
    active.forEach(function(id) {
      var ind = INDICATORS.find(function(x) { return x.id === id; });
      if (ind) studyList.push(ind.study);
    });

    /* Destroy old widgets and clear grid */
    grid.innerHTML = '';

    CHARTS.forEach(function(c, i) {
      /* Create cell and named container div */
      var cell   = document.createElement('div');
      cell.className = 'cell';

      var wrap   = document.createElement('div');
      wrap.className = 'tv-wrap';

      var contId = 'tv_chart_' + i;
      var cont   = document.createElement('div');
      cont.id    = contId;
      cont.style.width  = '100%';
      cont.style.height = '100%';

      wrap.appendChild(cont);
      cell.appendChild(wrap);
      grid.appendChild(cell);

      /* Build widget config */
      var cfg = {
        autosize:             true,
        symbol:               c.sym,
        interval:             c.iv,
        timezone:             'Asia/Bahrain',
        theme:                theme,
        style:                '1',
        locale:               'en',
        toolbar_bg:           theme === 'dark' ? '#131722' : '#ffffff',
        enable_publishing:    false,
        allow_symbol_change:  false,
        save_image:           false,
        hide_side_toolbar:    true,
        hide_legend:          !showLegend,
        withdateranges:       false,
        hide_top_toolbar:     !showToolbar,
        container_id:         contId,
        /* Disable volume by default */
        disabled_features: [
          'create_volume_indicator_by_default',
          'volume_force_overlay',
          'header_symbol_search',
          'header_compare',
        ],
        enabled_features: [
          'hide_last_na_study_output',
        ],
        /* Active studies */
        studies: studyList,
        studies_overrides: {
          'volume.volume.color.0': 'rgba(0,0,0,0)',
          'volume.volume.color.1': 'rgba(0,0,0,0)',
        },
        overrides: {
          'mainSeriesProperties.candleStyle.upColor':   '#26a69a',
          'mainSeriesProperties.candleStyle.downColor': '#ef5350',
          'mainSeriesProperties.candleStyle.borderUpColor':   '#26a69a',
          'mainSeriesProperties.candleStyle.borderDownColor': '#ef5350',
          'mainSeriesProperties.candleStyle.wickUpColor':   '#26a69a',
          'mainSeriesProperties.candleStyle.wickDownColor': '#ef5350',
        },
      };

      new TradingView.widget(cfg);
    });
  }

  /* ══ SYNC UI ══ */
  function syncUi() {
    document.getElementById('bar').className = 'bar' + (theme === 'light' ? ' light' : '');
    document.getElementById('dark-btn').classList.toggle('active',    theme === 'dark');
    document.getElementById('light-btn').classList.toggle('active',   theme === 'light');
    document.getElementById('toolbar-btn').classList.toggle('active', showToolbar);
    document.getElementById('legend-btn').classList.toggle('active',  showLegend);
    document.getElementById('ind-panel').classList.toggle('light',    theme === 'light');
  }

  /* ══ BUILD PANEL ══ */
  function buildPanel() {
    var body   = document.getElementById('panel-body');
    var groups = [];
    INDICATORS.forEach(function(i) { if (groups.indexOf(i.group) < 0) groups.push(i.group); });

    body.innerHTML = groups.map(function(grp) {
      var rows = INDICATORS.filter(function(i) { return i.group === grp; }).map(function(ind) {
        return '<div class="ind-row' + (active.has(ind.id) ? ' on' : '') + '" data-id="' + ind.id + '">' +
               '<div class="pill"></div>' +
               '<span class="ind-label">' + ind.label + '</span>' +
               '</div>';
      }).join('');
      return '<div class="ind-group"><div class="group-label">' + grp + '</div>' + rows + '</div>';
    }).join('');

    body.querySelectorAll('.ind-row').forEach(function(row) {
      row.addEventListener('click', function() {
        var id = row.dataset.id;
        if (active.has(id)) { active.delete(id); row.classList.remove('on'); }
        else                 { active.add(id);    row.classList.add('on');    }
      });
    });
  }

  /* ══ FULL REFRESH ══ */
  function refresh() {
    syncUi();
    renderCharts();
    saveSettings();
  }

  /* ══ BUTTONS ══ */
  document.getElementById('dark-btn').addEventListener('click',    function() { theme = 'dark';             refresh(); });
  document.getElementById('light-btn').addEventListener('click',   function() { theme = 'light';            refresh(); });
  document.getElementById('toolbar-btn').addEventListener('click', function() { showToolbar = !showToolbar; refresh(); });
  document.getElementById('legend-btn').addEventListener('click',  function() { showLegend  = !showLegend;  refresh(); });

  document.getElementById('ind-btn').addEventListener('click', function() {
    document.getElementById('ind-panel').classList.toggle('open');
  });
  document.getElementById('ind-close').addEventListener('click', function() {
    document.getElementById('ind-panel').classList.remove('open');
  });
  document.getElementById('apply-btn').addEventListener('click', function() {
    document.getElementById('ind-panel').classList.remove('open');
    refresh();
  });

  document.getElementById('fs-btn').addEventListener('click', function() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
    else document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', function() {
    var on = !!document.fullscreenElement;
    document.body.classList.toggle('fullscreen', on);
    document.getElementById('fs-btn').innerHTML = '<span class="fs-icon"></span>' + (on ? 'Exit' : 'Full');
  });

  /* ══ INIT ══ */
  tick();
  syncUi();
  buildPanel();
  renderCharts();
  syncFromCloud();
</script>
</body>
</html>
